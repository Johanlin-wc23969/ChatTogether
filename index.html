<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>匿名辩论房</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Web MVP</p>
          <h1>匿名辩论房</h1>
        </div>
        <div class="room-code" id="roomCode">未创建</div>
      </section>

      <section class="workspace">
        <aside class="setup-panel" aria-label="房间设置">
          <div class="panel-heading">
            <h2>创建房间</h2>
            <p id="connectionLabel">本地原型</p>
          </div>

          <label class="field">
            <span>主题分类</span>
            <select id="categorySelect">
              <option value="technology">科技</option>
              <option value="society">社会</option>
              <option value="workplace">职场</option>
              <option value="campus">校园</option>
              <option value="relationship">情感</option>
              <option value="entertainment">娱乐</option>
            </select>
          </label>

          <fieldset class="field">
            <legend>人数上限</legend>
            <div class="segmented" id="sizeOptions">
              <button type="button" data-size="2">2</button>
              <button type="button" data-size="3">3</button>
              <button type="button" data-size="4" class="active">4</button>
              <button type="button" data-size="5">5</button>
              <button type="button" data-size="6">6</button>
            </div>
          </fieldset>

          <button class="primary-action" id="createRoomButton" type="button">创建房间</button>

          <div class="invite-box">
            <span>邀请链接</span>
            <button id="copyInviteButton" type="button">复制</button>
          </div>

          <div class="host-tools">
            <button id="startRoomButton" type="button">开始辩论</button>
          </div>
        </aside>

        <section class="room-panel" aria-label="辩论房间">
          <header class="topic-board">
            <div>
              <p class="eyebrow" id="topicCategory">科技</p>
              <h2 id="topicTitle">AI 会让普通人的工作机会变多还是变少？</h2>
            </div>
            <div class="topic-positions">
              <span id="proPosition">正方：机会变多</span>
              <span id="conPosition">反方：机会变少</span>
            </div>
          </header>

          <div class="status-strip">
            <div>
              <span>房间</span>
              <strong id="roomStatus">等待中</strong>
            </div>
            <div>
              <span>当前轮次</span>
              <strong id="currentSide">正方</strong>
            </div>
            <div>
              <span>倒计时</span>
              <strong id="speakerTimer">--</strong>
            </div>
          </div>

          <section class="speaker-stage" id="speakerStage">
            <div class="persona-orb" id="speakerAvatar">?</div>
            <div>
              <p id="speakerLabel">等待第一位发言者</p>
              <h3 id="speakerName">暂无发言</h3>
            </div>
          </section>

          <section class="sides-grid">
            <div class="side-column pro-side">
              <div class="side-title">
                <span>正方</span>
                <button type="button" data-side="pro" class="side-request">正方排队</button>
              </div>
              <div class="participant-list" id="proList"></div>
            </div>

            <div class="side-column con-side">
              <div class="side-title">
                <span>反方</span>
                <button type="button" data-side="con" class="side-request">反方排队</button>
              </div>
              <div class="participant-list" id="conList"></div>
            </div>
          </section>

          <section class="queue-panel">
            <div>
              <span>正方队列</span>
              <strong id="proQueue">空</strong>
            </div>
            <div>
              <span>反方队列</span>
              <strong id="conQueue">空</strong>
            </div>
          </section>

          <footer class="action-bar">
            <button class="speak-button" id="speakButton" type="button">申请发言</button>
            <button class="end-button" id="endSpeakButton" type="button">结束发言</button>
          </footer>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
